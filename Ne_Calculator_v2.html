<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Effective Porosity (Ne) Analysis Suite</title>
    <!-- Chart.js for Visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { color: #1a365d; border-bottom: 3px solid #cbd5e0; padding-bottom: 10px; }
        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        @media (max-width: 768px) { .grid-layout { grid-template-columns: 1fr; } }
        .card { background: #f8fafc; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; font-size: 0.85em; color: #4a5568; }
        input, select { width: 100%; padding: 10px; border: 1px solid #cbd5e0; border-radius: 5px; box-sizing: border-box; margin-bottom: 10px; }
        button { background-color: #2b6cb0; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; }
        button:hover { background-color: #2c5282; }
        .btn-success { background-color: #38a169; }
        .btn-success:hover { background-color: #2f855a; }
        .stats-box { background: #ebf8ff; padding: 15px; border-left: 5px solid #3182ce; margin-top: 20px; display: none; }
        .chart-container { margin-top: 30px; height: 400px; display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9em; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #2d3748; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>Effective Porosity (Ne) Analysis Suite</h2>
    
    <div class="grid-layout">
        <!-- Input Configuration -->
        <div class="card">
            <h3>Input & Units</h3>
            <label>Flow Rate (Q) Units:</label>
            <select id="unitQ">
                <option value="1">m³/day (Standard)</option>
                <option value="5.45099">Gallons per Minute (GPM)</option>
                <option value="86.4">Liters per Second (L/s)</option>
                <option value="24">m³/hour</option>
            </select>
            
            <label>Drawdown (s) Units:</label>
            <select id="unitS">
                <option value="1">Meters (Standard)</option>
                <option value="0.3048">Feet</option>
            </select>

            <hr>
            
            <label>Manual Entry (Q):</label>
            <input type="number" id="manualQ" placeholder="Value for Q">
            <label>Manual Entry (s):</label>
            <input type="number" id="manualS" placeholder="Value for s">
            <button onclick="addManual()">Calculate & Add Record</button>
        </div>

        <!-- Bulk Upload -->
        <div class="card">
            <h3>Bulk Data Processing</h3>
            <p style="font-size: 0.85em; color: #718096;">Upload CSV with columns 'Q' and 's'. Units selected on the left will be applied to the entire file.</p>
            <input type="file" id="csvInput" accept=".csv">
            <button class="btn-success" onclick="processBulk()">Process Bulk File</button>
            
            <div id="statsArea" class="stats-box">
                <h4>Statistical Summary (Bulk Data)</h4>
                <div id="statsContent"></div>
            </div>
        </div>
    </div>

    <div id="chartArea" class="chart-container">
        <canvas id="neChart"></canvas>
    </div>

    <div class="card">
        <h3>Calculated Dataset</h3>
        <div style="overflow-x:auto;">
            <table id="resultsTable">
                <thead>
                    <tr>
                        <th>Q (Standard)</th>
                        <th>s (Standard)</th>
                        <th>Q/s Ratio</th>
                        <th>Ne Result</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        <button style="margin-top:20px;" onclick="downloadCSV()">Export Final CSV</button>
    </div>
</div>

<script>
    let dataset = [];
    let myChart = null;

    function calculateNe(q, s) {
        const normalizedQ = q * parseFloat(document.getElementById('unitQ').value);
        const normalizedS = s * parseFloat(document.getElementById('unitS').value);
        if (normalizedS <= 0) return null;
        
        const ratio = normalizedQ / normalizedS;
        const ne = 0.15108 * Math.pow(ratio, 0.0826);
        return { q: normalizedQ.toFixed(2), s: normalizedS.toFixed(2), ratio: ratio.toFixed(4), ne: ne.toFixed(6) };
    }

    function addManual() {
        const q = parseFloat(document.getElementById('manualQ').value);
        const s = parseFloat(document.getElementById('manualS').value);
        if (isNaN(q) || isNaN(s)) return alert("Enter valid numbers.");
        
        const result = calculateNe(q, s);
        if (result) {
            dataset.push(result);
            updateUI();
        }
    }

    function processBulk() {
        const file = document.getElementById('csvInput').files[0];
        if (!file) return alert("Select a file.");
        
        const reader = new FileReader();
        reader.onload = function(e) {
            const lines = e.target.result.split('\n').filter(l => l.trim().length > 0);
            const headers = lines[0].toLowerCase().split(',');
            const qIdx = headers.indexOf('q');
            const sIdx = headers.indexOf('s');

            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(',');
                const result = calculateNe(parseFloat(cols[qIdx]), parseFloat(cols[sIdx]));
                if (result) dataset.push(result);
            }
            updateUI(true);
        };
        reader.readAsText(file);
    }

    function updateUI(showAnalysis = false) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        dataset.forEach(row => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${row.q}</td><td>${row.s}</td><td>${row.ratio}</td><td><strong>${row.ne}</strong></td>`;
            tbody.prepend(tr);
        });

        if (showAnalysis && dataset.length > 1) {
            document.getElementById('statsArea').style.display = 'block';
            document.getElementById('chartArea').style.display = 'block';
            runStats();
            renderChart();
        }
    }

    function runStats() {
        const nes = dataset.map(d => parseFloat(d.ne));
        const mean = nes.reduce((a, b) => a + b) / nes.length;
        const stdDev = Math.sqrt(nes.map(x => Math.pow(x - mean, 2)).reduce((a, b) => a + b) / nes.length);
        
        document.getElementById('statsContent').innerHTML = `
            <strong>Mean Ne:</strong> ${mean.toFixed(6)}<br>
            <strong>Standard Deviation:</strong> ${stdDev.toFixed(6)}<br>
            <strong>Sample Size:</strong> ${nes.length}
        `;
    }

    function renderChart() {
        const ctx = document.getElementById('neChart').getContext('2d');
        const sortedData = [...dataset].sort((a, b) => a.ratio - b.ratio);
        
        if (myChart) myChart.destroy();
        
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: sortedData.map(d => d.ratio),
                datasets: [{
                    label: 'Effective Porosity (Ne) vs Q/s Ratio',
                    data: sortedData.map(d => d.ne),
                    borderColor: '#2b6cb0',
                    backgroundColor: 'rgba(43, 108, 176, 0.1)',
                    fill: true,
                    tension: 0.3
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    function downloadCSV() {
        let csv = "Q (m3/day),s (m),Q/s Ratio,Ne\n";
        dataset.forEach(d => csv += `${d.q},${d.s},${d.ratio},${d.ne}\n`);
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'Ne_Analysis_Results.csv';
        a.click();
    }
</script>
</body>
</html>
